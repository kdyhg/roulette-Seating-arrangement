<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리배치표 (해강고 김동연T)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; }
        .classroom-container { max-width: 1200px; margin: 0 auto; }
        
        .btn-purple { background-color: #5851db; color: white; }
        .btn-green { background-color: #009664; color: white; }
        .btn-white { background-color: white; border: 1px solid #e2e8f0; color: #4a5568; }
        .side-bar { background-color: #1e5f85; color: white; border-radius: 4px; width: 60px; display: flex; align-items: center; justify-content: center; align-self: stretch; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .vertical-text { writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 0.5em; font-weight: 900; font-size: 1.5rem; }

        .desk {
            width: 75px; height: 60px; border: 1.5px solid #333;
            background-color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
            margin: 2px; transition: all 0.2s; cursor: pointer;
        }
        .desk.seat-fixed { background-color: #fef08a; border-color: #ca8a04; }
        .desk.selected { background-color: #bfdbfe; border-color: #2563eb; }
        
        .desk-number { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: #d1d5db; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 0;
            user-select: none;
        }
        .student-name { 
            font-size: 1rem; 
            font-weight: 800; 
            color: #111; 
            z-index: 10; 
            position: relative;
            pointer-events: none; 
        }

        /* 시점 전환 애니메이션 및 레이아웃 제어 */
        .teacher-view #layout-main { flex-direction: row; } 
        .teacher-view #desk-area-wrapper { flex-direction: column; } 
        .teacher-view .desk-col { flex-direction: column-reverse; } 
        .teacher-view .seat-row { flex-direction: row-reverse; } 
        .teacher-view .desk-cluster { flex-direction: row-reverse; } 

        .student-view #layout-main { flex-direction: row-reverse; } 
        .student-view #desk-area-wrapper { flex-direction: column-reverse; } 
        .student-view .desk-col { flex-direction: column; } 
        .student-view .seat-row { flex-direction: row; } 
        .student-view .desk-cluster { flex-direction: row; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal select { background: white; }
        .validation-panel { display: none; border-radius: 12px; border: 1px solid #fecaca; background: #fff7f7; color: #7f1d1d; }
        .validation-panel.active { display: block; }
        .validation-panel.success { border-color: #bbf7d0; background: #f0fdf4; color: #14532d; }
        .validation-panel ul { margin-left: 1.2rem; list-style: disc; }
        .history-meta { font-size: 0.78rem; color: #64748b; }

        /* 검증 위반 좌석 스타일 */
        .violation { 
            background-color: #fee2e2 !important; 
            border-color: #ef4444 !important; 
            animation: pulse 1.5s infinite;
            z-index: 20;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 룰렛 캔버스 숨김 처리 */
        canvas { display: none !important; }
        
        #loadingOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        #loadingOverlay.active { display: flex; }

        @media print {
            body { background: white; padding: 0 !important; }
            header .mt-4, #controls-panel, .modal, #loadingOverlay { display: none !important; }
            .classroom-container { max-width: none; margin: 0; }
            header { margin-bottom: 16px !important; }
            #layout-main { gap: 12px !important; padding: 0 !important; break-inside: avoid; }
            .side-bar, .desk, #kyotak > div { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .desk { box-shadow: none !important; }
            .desk-number { display: none !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8 teacher-view">

    <div class="classroom-container">
        <header class="text-center mb-6">
            <h1 class="text-4xl font-black text-[#1e293b] mb-2">자리배치표 설정</h1>
            <p class="text-gray-500 font-medium" id="view-label">현재: 교사 시점 (운동장: 우측 / 교탁: 아래)</p>
            <div class="mt-4">
                <button type="button" class="text-indigo-600 font-bold hover:underline" onclick="window.location.assign('index.html')">← 마블 룰렛 화면으로 돌아가기</button>
            </div>
        </header>

        <div id="controls-panel" class="bg-white p-6 rounded-2xl shadow-md mb-10 border border-gray-100">
            <div class="flex flex-wrap gap-4 justify-between items-center mb-6 border-b border-gray-50 pb-6">
                <div class="flex flex-wrap gap-2">
                    <button id="btnBulkInput" class="btn-purple px-5 py-2.5 rounded-lg font-bold shadow-sm">📋 명단 일괄 입력</button>
                    <button id="btnCopy" class="btn-white px-5 py-2.5 rounded-lg font-bold shadow-sm border-gray-300">📋 명단 복사</button>
                    <button id="btnUndo" class="btn-white px-5 py-2.5 rounded-lg font-bold shadow-sm border-gray-300">↩ 되돌리기</button>
                    <button id="btnResetLayout" class="btn-white px-5 py-2.5 rounded-lg font-bold shadow-sm border-gray-300">🧹 자리 초기화</button>
                    <button id="swapModeBtn" class="btn-white px-5 py-2.5 rounded-lg font-bold shadow-sm">
                        🔄 자리 바꾸기: <span id="swapStatus" class="text-red-500">OFF</span>
                    </button>
                    <button id="btnValidationModal" class="btn-white px-5 py-2.5 rounded-lg font-bold shadow-sm border-gray-300">⚙️ 검증 설정</button>
                    <button id="btnValidate" class="btn-purple px-5 py-2.5 rounded-lg font-bold shadow-sm" style="background-color: #ef4444;">🚨 배치 검증</button>
                    <button id="btnToggleView" class="btn-green px-5 py-2.5 rounded-lg font-bold shadow-sm flex items-center gap-2">
                        👀 <span id="viewBtnText">학생 시점으로 보기</span>
                    </button>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button id="btnPrint" class="btn-white px-5 py-2.5 rounded-lg font-bold shadow-sm border-gray-300">🖨 인쇄/PDF</button>
                    <button id="btnSavePng" class="btn-white px-5 py-2.5 rounded-lg font-bold shadow-sm border-gray-300">🖼 이미지 저장</button>
                    <button id="btnRunRoulette" class="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-lg font-black shadow-lg hover:bg-yellow-300 transform hover:scale-105 transition-all">
                        🎲 룰렛 돌리기 (자동배치)
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 pt-2">
                <div>
                    <label class="text-xs font-black text-gray-400 uppercase">전체 인원</label>
                    <input type="number" id="inputTotal" value="23" class="w-full border-b-2 border-gray-200 p-1 font-bold outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-black text-gray-400 uppercase">분단 개수</label>
                    <input type="number" id="inputCols" value="3" class="w-full border-b-2 border-gray-200 p-1 font-bold outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-black text-gray-400 uppercase">최근 기록</label>
                    <div id="historyMeta" class="history-meta pt-2">저장된 되돌리기 기록 없음</div>
                </div>
                <div>
                    <label class="text-xs font-black text-gray-400 uppercase">검증 상태</label>
                    <div id="validationSummary" class="history-meta pt-2">아직 검증하지 않음</div>
                </div>
            </div>
            <div id="validationResults" class="validation-panel mt-5 p-4 text-sm font-semibold"></div>
        </div>

        <div id="layout-main" class="flex justify-between items-stretch gap-4 px-4 transition-all duration-500">
            <div id="sidebar-left" class="side-bar"><span class="vertical-text">복 도</span></div>
            <div id="desk-area-wrapper" class="flex-1 flex flex-col items-center">
                <div id="desk-grid-container" class="flex flex-col gap-6 w-full items-center mt-2"></div>
                <div id="kyotak" class="mt-4 mb-4">
                    <div class="bg-[#fbc4ab] text-[#9c4d28] px-14 py-4 rounded-md text-2xl font-black shadow-md border-b-4 border-[#e5a88a]">교 탁</div>
                </div>
            </div>
            <div id="sidebar-right" class="side-bar"><span class="vertical-text">운 동 장</span></div>
        </div>
    </div>

    <!-- 명단 일괄 입력 모달 -->
    <div id="bulkInputModal" class="modal">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <h3 class="text-xl font-bold mb-4 font-black">학생 명단 일괄 입력</h3>
            <textarea id="bulkNames" rows="10" class="w-full border p-4 rounded-xl mb-4 text-sm outline-none focus:border-indigo-500" placeholder="이름을 입력하세요 (엔터 또는 쉼표로 구분)."></textarea>
            <div class="flex justify-end gap-2">
                <button id="btnCancelBulk" class="px-4 py-2 text-gray-400 font-bold">취소</button>
                <button id="btnApplyBulk" class="px-6 py-2 btn-purple rounded-lg font-bold">명단 저장</button>
            </div>
        </div>
    </div>

    <!-- 고정 좌석 학생 선택 모달 -->
    <div id="fixedSeatModal" class="modal">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm mx-4">
            <h3 class="text-xl font-bold mb-2 font-black">고정 학생 선택</h3>
            <p id="fixedSeatLabel" class="text-sm text-gray-500 mb-4"></p>
            <select id="fixedSeatSelect" class="w-full border p-3 rounded-lg mb-5 text-sm outline-none focus:border-indigo-500"></select>
            <div class="flex justify-between gap-2">
                <button id="btnClearFixed" class="px-4 py-2 text-red-500 font-bold">고정 해제</button>
                <div class="flex gap-2">
                    <button id="btnCancelFixed" class="px-4 py-2 text-gray-400 font-bold">닫기</button>
                    <button id="btnSaveFixed" class="px-6 py-2 btn-purple rounded-lg font-bold">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 검증 설정 모달 -->
    <div id="validationModal" class="modal">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <h3 class="text-xl font-bold mb-4 font-black">자리 배치 검증 설정</h3>
            
            <label class="block text-sm font-bold text-gray-700 mb-1">필수 짝꿍 (반드시 붙어 앉아야 함, 예: 홍길동-김철수, 쉼표 구분)</label>
            <input type="text" id="valRequiredPairs" class="w-full border p-2 rounded-lg mb-4 text-sm outline-none focus:border-indigo-500" placeholder="홍길동-김철수">
            
            <label class="block text-sm font-bold text-gray-700 mb-1">금지 짝꿍 (예: 홍길동-김철수, 쉼표 구분)</label>
            <input type="text" id="valBannedPairs" class="w-full border p-2 rounded-lg mb-4 text-sm outline-none focus:border-indigo-500" placeholder="홍길동-김철수, 이영희-박민수">
            
            <label class="block text-sm font-bold text-gray-700 mb-1">인접 금지 그룹 (상하좌우/대각선 분리, 쉼표 구분)</label>
            <input type="text" id="valSeparated" class="w-full border p-2 rounded-lg mb-4 text-sm outline-none focus:border-indigo-500" placeholder="김동연, 강동원, 원빈">
            
            <label class="block text-sm font-bold text-gray-700 mb-1">필수 1,2열 배치 학생 (저시력 학생 등, 쉼표 구분)</label>
            <input type="text" id="valFrontRow" class="w-full border p-2 rounded-lg mb-4 text-sm outline-none focus:border-indigo-500" placeholder="유재석, 박명수">
            
            <div class="flex justify-end gap-2 mt-4">
                <button id="btnCancelValidation" class="px-4 py-2 text-gray-400 font-bold">닫기</button>
                <button id="btnSaveValidation" class="px-6 py-2 btn-purple rounded-lg font-bold">저장</button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay">
        <div class="text-6xl mb-4 animate-spin">🎲</div>
        <h2 class="text-2xl font-bold">최적의 자리를 계산 중입니다...</h2>
        <p class="text-gray-300 mt-2">물리 시뮬레이션을 통해 완벽한 배치를 찾는 중입니다.</p>
    </div>

    <script type="module" src="./src/seating.ts"></script>
</body>
</html>
